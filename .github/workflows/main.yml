name: Daily API Data Fetch

# 設定觸發條件
on:
  schedule:
    - [cite_start]cron: '0 0 * * *' # 每天凌晨 00:00 執行 (符合每天觸發要求) [cite: 5]
  [cite_start]workflow_dispatch:    # 允許在介面上點擊按鈕手動執行 (符合手動觸發要求) 

jobs:
  run-api-script:
    [cite_start]runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 雲端環境 [cite: 161]
    
    steps:
      - name: Checkout repository
        [cite_start]uses: actions/checkout@v3 # 把你的程式碼從倉庫下載到雲端機器 [cite: 168, 169]

      - name: Set up Python
        [cite_start]uses: actions/setup-python@v4 # 在雲端安裝 Python 環境 [cite: 174]
        with:
          [cite_start]python-version: '3.10' [cite: 179]

      - name: Install dependencies
        [cite_start]run: pip install requests # 安裝抓取資料需要的 requests 套件 [cite: 190]

      - name: Run API script
        [cite_start]run: python api.py # 執行你在第三步寫好的程式碼 [cite: 199]

      - name: Upload results
        [cite_start]uses: actions/upload-artifact@v3 # 將產生的 JSON/CSV 存檔，否則會消失 [cite: 211]
        with:
          name: api-output-files
          path: |
            users.json
            users.csv
