name: Daily API Data Fetch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 升級到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run API script
        run: python api.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: api-output-files
          path: |
            data.json
            data.csv
